<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drug Dosage Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('calc-tab')">Calculate</button>
            <button class="tab-btn" onclick="switchTab('manage-tab')">Add Drug</button>
            <button class="tab-btn" onclick="switchTab('list-tab')">Drug List</button>
        </div>

        <!-- CALCULATE TAB -->
        <div id="calc-tab" class="tab-content active">
            <h2>Calculate Dosage</h2>

            <div class="input-group">
                <label>Patient Weight (kg):</label>
                <input type="number" id="patient-weight" step="0.1" min="0" placeholder="e.g., 20">
            </div>

            <div class="calc-toolbar">
                <input type="text" id="drug-search" placeholder="Search drug name...">
                <button class="primary-btn add-card-btn" onclick="addDrugCard()">+ Add Drug</button>
            </div>

            <div id="drug-cards-container"></div>
        </div>

        <!-- ADD DRUG TAB -->
        <div id="manage-tab" class="tab-content">
            <h2>Add New Drug</h2>
            <form id="drug-form" onsubmit="saveDrug(event)">
                <div class="input-group">
                    <label>Drug Name:</label>
                    <input type="text" id="drug-name" required>
                </div>
                <div class="input-group">
                    <label>Dose Range (mg/kg):</label>
                    <div class="dose-range-row">
                        <input type="number" id="drug-dose-min" step="0.01" min="0" placeholder="Min" required>
                        <span class="dose-range-sep">–</span>
                        <input type="number" id="drug-dose-max" step="0.01" min="0" placeholder="Max" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Times per Day:</label>
                    <input type="number" id="times-per-day" min="1" placeholder="e.g., 3" required>
                </div>
                <div class="input-group">
                    <label>Maximum Dose (mg):</label>
                    <input type="number" id="max-dose" step="0.01" min="0" placeholder="e.g., 500">
                </div>
                <div class="input-group">
                    <label>Medication Timing:</label>
                    <input type="text" id="medication-timing" placeholder="e.g. AC, PC, HS, PRN, STAT">
                </div>
                <div class="input-group">
                    <label>Caution Note:</label>
                    <textarea id="caution-note" rows="3" placeholder="e.g., Avoid in renal impairment."></textarea>
                </div>
                <button type="submit" class="success-btn">Save Drug to System</button>
            </form>
        </div>

        <!-- DRUG LIST TAB -->
        <div id="list-tab" class="tab-content">
            <h2>Drug Database</h2>
            <div id="drug-list-container">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h2>Edit Drug</h2>
            <form id="edit-drug-form" onsubmit="saveEditDrug(event)">
                <div class="input-group">
                    <label>Drug Name:</label>
                    <input type="text" id="edit-drug-name" required>
                </div>
                <div class="input-group">
                    <label>Dose Range (mg/kg):</label>
                    <div class="dose-range-row">
                        <input type="number" id="edit-dose-min" step="0.01" min="0" placeholder="Min" required>
                        <span class="dose-range-sep">–</span>
                        <input type="number" id="edit-dose-max" step="0.01" min="0" placeholder="Max" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Times per Day:</label>
                    <input type="number" id="edit-times-per-day" min="1" required>
                </div>
                <div class="input-group">
                    <label>Maximum Dose (mg):</label>
                    <input type="number" id="edit-max-dose" step="0.01" min="0">
                </div>
                <div class="input-group">
                    <label>Medication Timing:</label>
                    <input type="text" id="edit-medication-timing" placeholder="e.g. AC, PC, HS, PRN, STAT">
                </div>
                <div class="input-group">
                    <label>Caution Note:</label>
                    <textarea id="edit-caution-note" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="success-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
