<div id="manage-tab" class="tab-content">
    <h2>Add New Drug</h2>
    <form id="drug-form" onsubmit="saveDrug(event)">
        <div class="input-group">
            <label>Drug Name:</label>
            <input type="text" id="drug-name" required>
        </div>

        <div class="input-row">
            <div>
                <label>Calculated From:</label>
                <select id="calc-from" onchange="updateCalculatedFromLabels()">
                    <option value="age">Age</option>
                    <option value="weight">Weight</option>
                    <option value="height*weight">Height * Weight</option>
                    <option value="constant">Constant</option>
                </select>
            </div>
            <div>
                <label>Calculated By:</label>
                <select id="calc-by" onchange="toggleFormFields()">
                    <option value="static">Static</option>
                    <option value="constant">Constant</option>
                    <option value="range">Range</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Times per day:</label>
            <input type="number" id="times-per-day" min="1" placeholder="e.g., 3" required>
        </div>

        <div id="single-rule-inputs">
            <h4>Dosage Rules</h4>
            <div id="single-rule-rows">
                </div>
            <button type="button" id="add-single-btn" onclick="addSingleRuleRow()" style="display: none;">+ Add Rule</button>
        </div>

        <div id="range-rule-inputs" style="display: none;">
            <h4>Range Dosage Rules</h4>
            <div id="range-rows">
                </div>
            <button type="button" onclick="addRangeRow()">+ Add Range</button>
        </div>

        <div class="input-group">
            <label>Contraindications / Risks (Comma separated):</label>
            <input type="text" id="contraindications" placeholder="e.g., kidney, digestive, pregnancy">
        </div>

        <button type="submit" class="success-btn">Save Drug to System</button>
    </form>
</div>
